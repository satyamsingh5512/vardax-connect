# vardax-ddos/infrastructure/k8s/redis.yaml
# Redis for rate limiting and caching
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: vardax-ddos
data:
  redis.conf: |
    # Memory management
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    
    # Persistence (optional for rate limiting)
    save ""
    appendonly no
    
    # Performance
    tcp-keepalive 300
    timeout 0
    
    # Security
    protected-mode yes
    
    # Cluster mode (for production)
    # cluster-enabled yes
    # cluster-config-file nodes.conf
    # cluster-node-timeout 5000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: vardax-ddos
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - /etc/redis/redis.conf
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/redis
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vardax-ddos
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
