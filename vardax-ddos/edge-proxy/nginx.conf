# vardax-ddos/edge-proxy/nginx.conf
# VardaX Edge Proxy Configuration - Nginx + Lua
# Features: TLS termination, rate limiting, WAF integration, caching

# Load modules
load_module modules/ngx_http_lua_module.so;
load_module modules/ngx_http_geoip2_module.so;

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with security fields
    log_format vardax_json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"request_id":"$request_id",'
        '"client_ip":"$remote_addr",'
        '"xff":"$http_x_forwarded_for",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"protocol":"$server_protocol",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher",'
        '"ja3_hash":"$http_x_ja3_hash",'
        '"geoip_country":"$geoip2_data_country_code",'
        '"rate_limit_status":"$limit_req_status",'
        '"bot_score":"$http_x_bot_score",'
        '"action":"$http_x_vardax_action"'
    '}';

    access_log /var/log/nginx/access.log vardax_json;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    # Buffer sizes
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 10m;
    large_client_header_buffers 4 8k;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # GeoIP2 configuration
    geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
        $geoip2_data_country_code country iso_code;
        $geoip2_data_country_name country names en;
    }

    geoip2 /usr/share/GeoIP/GeoLite2-ASN.mmdb {
        $geoip2_data_asn autonomous_system_number;
        $geoip2_data_asn_org autonomous_system_organization;
    }

    # Lua shared dictionaries
    lua_shared_dict rate_limit 100m;
    lua_shared_dict bot_cache 50m;
    lua_shared_dict challenge_tokens 50m;
    lua_shared_dict blocklist 50m;
    lua_shared_dict ip_reputation 50m;

    # Lua package path
    lua_package_path "/etc/nginx/lua/?.lua;;";

    # Initialize Lua modules
    init_by_lua_block {
        require "resty.core"
        
        -- Initialize rate limiter
        local rate_limiter = require "vardax.rate_limiter"
        rate_limiter.init()
        
        -- Initialize bot detector client
        local bot_detector = require "vardax.bot_detector"
        bot_detector.init("http://bot-detector:8083")
        
        -- Initialize WAF
        local waf = require "vardax.waf"
        waf.init("/etc/nginx/waf/rules.yaml")
    }

    init_worker_by_lua_block {
        -- Sync blocklist from Redis periodically
        local blocklist = require "vardax.blocklist"
        blocklist.start_sync("redis:6379")
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=ip_limit:50m rate=100r/s;
    limit_req_zone $binary_remote_addr$uri zone=path_limit:50m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:50m;

    # Upstream definitions
    upstream origin_servers {
        least_conn;
        keepalive 100;
        
        server origin-1:8080 weight=5 max_fails=3 fail_timeout=30s;
        server origin-2:8080 weight=5 max_fails=3 fail_timeout=30s;
        server origin-3:8080 backup;
    }

    upstream bot_detector {
        server bot-detector:8083;
        keepalive 50;
    }

    upstream challenge_service {
        server challenge-service:8082;
        keepalive 20;
    }

    # Cache configuration
    proxy_cache_path /var/cache/nginx/vardax levels=1:2 keys_zone=vardax_cache:100m 
                     max_size=10g inactive=60m use_temp_path=off;

    # HTTP to HTTPS redirect
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/certs/ca.crt;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Request ID
        set $request_id $request_id;
        add_header X-Request-ID $request_id always;

        # VardaX protection - runs on every request
        access_by_lua_block {
            local vardax = require "vardax.main"
            
            -- Build request context
            local ctx = {
                ip = ngx.var.remote_addr,
                method = ngx.var.request_method,
                uri = ngx.var.request_uri,
                path = ngx.var.uri,
                user_agent = ngx.var.http_user_agent or "",
                referer = ngx.var.http_referer or "",
                content_type = ngx.var.content_type or "",
                content_length = tonumber(ngx.var.content_length) or 0,
                ssl_protocol = ngx.var.ssl_protocol,
                ssl_cipher = ngx.var.ssl_cipher,
                geoip_country = ngx.var.geoip2_data_country_code,
                geoip_asn = ngx.var.geoip2_data_asn,
                request_id = ngx.var.request_id,
                headers = ngx.req.get_headers(),
            }
            
            -- Run VardaX protection pipeline
            local action, reason = vardax.protect(ctx)
            
            -- Store for logging
            ngx.var.http_x_vardax_action = action
            
            if action == "block" then
                ngx.log(ngx.WARN, "Blocked request: ", reason, " IP: ", ctx.ip)
                ngx.status = 403
                ngx.header["Content-Type"] = "text/html"
                ngx.say("<html><body><h1>Access Denied</h1><p>Request blocked by VardaX WAF</p></body></html>")
                return ngx.exit(403)
            elseif action == "challenge" then
                -- Redirect to challenge page
                return ngx.redirect("/.vardax/challenge?return=" .. ngx.escape_uri(ctx.uri))
            elseif action == "throttle" then
                -- Add delay
                ngx.sleep(1)
            end
            -- action == "allow" - continue normally
        }

        # Rate limiting
        limit_req zone=ip_limit burst=200 nodelay;
        limit_conn conn_limit 100;

        # Health check endpoint (bypass protection)
        location = /health {
            access_by_lua_block { }  -- Skip VardaX for health checks
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # VardaX challenge endpoint
        location /.vardax/challenge {
            proxy_pass http://challenge_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # VardaX API endpoints (internal)
        location /.vardax/api/ {
            internal;
            proxy_pass http://bot_detector/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static assets with caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://origin_servers;
            proxy_cache vardax_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            
            add_header X-Cache-Status $upstream_cache_status;
            expires 1d;
        }

        # API endpoints (no caching)
        location /api/ {
            proxy_pass http://origin_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Stricter rate limiting for API
            limit_req zone=path_limit burst=50 nodelay;
        }

        # Default location
        location / {
            proxy_pass http://origin_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Caching for cacheable responses
            proxy_cache vardax_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_bypass $http_cache_control;
            
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Prometheus metrics endpoint
    server {
        listen 9145;
        server_name _;
        
        location /metrics {
            content_by_lua_block {
                local metrics = require "vardax.metrics"
                ngx.say(metrics.export_prometheus())
            }
        }
    }
}
