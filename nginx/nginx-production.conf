# VARDAx Production NGINX Configuration
# Full integration with ModSecurity WAF + Lua enforcement + ML pipeline

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load dynamic modules
load_module modules/ngx_http_modsecurity_module.so;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with VARDAx metadata
    log_format vardax_extended '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time" '
                        'vardax_score="$sent_http_x_vardax_score" '
                        'vardax_action="$sent_http_x_vardax_action" '
                        'request_id="$request_id"';

    access_log /var/log/nginx/access.log vardax_extended;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    # Lua package path for VARDAx scripts
    lua_package_path "/etc/nginx/lua/?.lua;;";
    lua_shared_dict vardax_cache 10m;
    lua_shared_dict vardax_rate_limit 10m;

    # ModSecurity WAF
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/modsecurity.conf;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Upstream: Your backend application
    upstream backend {
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream: VARDAx ML pipeline
    upstream vardax_ml {
        server vardax-backend:8000 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    # Upstream: VARDAx Dashboard
    upstream vardax_dashboard {
        server vardax-frontend:3000;
        keepalive 8;
    }

    # ========================================================================
    # HTTP Server (redirect to HTTPS)
    # ========================================================================
    server {
        listen 80;
        server_name _;

        # Health check (no redirect)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================================
    # HTTPS Server (Main Application)
    # ========================================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern SSL configuration (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS (2 years)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Connection limiting
        limit_conn addr 10;

        # ====================================================================
        # VARDAx Dashboard (Admin UI)
        # ====================================================================
        location /vardax/ {
            # No WAF/ML for dashboard itself
            modsecurity off;

            proxy_pass http://vardax_dashboard/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # TODO: Add authentication here in production
        }

        # ====================================================================
        # VARDAx API (Internal - for Lua scripts)
        # ====================================================================
        location /vardax-api/ {
            internal;  # Only accessible from Lua
            
            proxy_pass http://vardax_ml/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            
            # Short timeout for ML inference
            proxy_connect_timeout 50ms;
            proxy_send_timeout 50ms;
            proxy_read_timeout 50ms;
        }

        # ====================================================================
        # Main Application (Protected by VARDAx)
        # ====================================================================
        location / {
            # Rate limiting
            limit_req zone=general burst=20 nodelay;

            # PHASE 1: ModSecurity WAF (signature-based)
            modsecurity on;

            # PHASE 2: VARDAx Lua enforcement (ML-based)
            access_by_lua_file /etc/nginx/lua/vardax_edge.lua;

            # PHASE 3: Mirror traffic to ML pipeline (async)
            mirror /vardax_mirror;
            mirror_request_body on;

            # PHASE 4: Proxy to backend
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ====================================================================
        # API Endpoints (Stricter rate limiting)
        # ====================================================================
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            modsecurity on;
            access_by_lua_file /etc/nginx/lua/vardax_edge.lua;
            mirror /vardax_mirror;
            mirror_request_body on;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
        }

        # ====================================================================
        # Login Endpoint (Very strict rate limiting)
        # ====================================================================
        location /api/login {
            limit_req zone=login burst=3 nodelay;

            modsecurity on;
            access_by_lua_file /etc/nginx/lua/vardax_edge.lua;
            mirror /vardax_mirror;
            mirror_request_body on;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
        }

        # ====================================================================
        # Traffic Mirror (Async ML analysis)
        # ====================================================================
        location = /vardax_mirror {
            internal;
            
            # Fire and forget - don't wait for response
            proxy_pass http://vardax_ml/api/v1/traffic/ingest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Request-URI $request_uri;
            proxy_set_header X-Request-Method $request_method;
            proxy_set_header Content-Type application/json;
            
            # Very short timeout - we don't care about response
            proxy_connect_timeout 100ms;
            proxy_send_timeout 100ms;
            proxy_read_timeout 100ms;
        }

        # ====================================================================
        # Health Check (No protection)
        # ====================================================================
        location /health {
            access_log off;
            modsecurity off;
            
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
