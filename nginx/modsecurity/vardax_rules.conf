# =============================================================================
# RULE CATEGORY: Scanner Detection
# =============================================================================

# Block known security scanners
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(nikto|sqlmap|nmap|masscan|dirbuster|gobuster|wfuzz|burp|zap|acunetix|nessus|openvas|w3af|skipfish|arachni)" \
    "id:9900200,\
    phase:1,\
    deny,status:403,\
    msg:'VARDAx: Known security scanner detected',\
    tag:'vardax/scanner',\
    tag:'automation/security-scanner',\
    severity:'CRITICAL'"

# =============================================================================
# RULE CATEGORY: Encoding Detection
# =============================================================================

# Detect heavily encoded requests (possible evasion)
SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?:%[0-9a-fA-F]{2}){10,}" \
    "id:9900300,\
    phase:2,\
    log,pass,\
    msg:'VARDAx: Heavy URL encoding detected - possible evasion',\
    tag:'vardax/encoding',\
    tag:'attack/evasion',\
    severity:'WARNING'"

# =============================================================================
# RULE CATEGORY: Bot Detection
# =============================================================================

# Detect missing or suspicious headers
SecRule &REQUEST_HEADERS:Accept "@eq 0" \
    "id:9900400,\
    phase:1,\
    log,pass,\
    setvar:'tx.vardax_bot_score=+1',\
    msg:'VARDAx: Missing Accept header',\
    tag:'vardax/bot-indicator'"

SecRule &REQUEST_HEADERS:Accept-Language "@eq 0" \
    "id:9900401,\
    phase:1,\
    log,pass,\
    setvar:'tx.vardax_bot_score=+1',\
    msg:'VARDAx: Missing Accept-Language header',\
    tag:'vardax/bot-indicator'"

SecRule TX:VARDAX_BOT_SCORE "@ge 3" \
    "id:9900402,\
    phase:1,\
    log,pass,\
    msg:'VARDAx: Bot-like request detected (score: %{tx.vardax_bot_score})',\
    tag:'vardax/bot',\
    severity:'WARNING'"

