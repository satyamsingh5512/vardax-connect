version: '3.8'

services:
  # NGINX with ModSecurity WAF
  nginx:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/modsecurity:/etc/modsecurity.d/custom:ro
    depends_on:
      - backend
    networks:
      - vardax-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VARDAX_REDIS_URL=redis://redis:6379
      - VARDAX_DATABASE_URL=postgresql://vardax:vardax@postgres:5432/vardax
    volumes:
      - ./models:/app/models
    depends_on:
      - redis
      - postgres
    networks:
      - vardax-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - vardax-network

  # Redis for streaming and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vardax-network

  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=vardax
      - POSTGRES_PASSWORD=vardax
      - POSTGRES_DB=vardax
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vardax-network

networks:
  vardax-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
