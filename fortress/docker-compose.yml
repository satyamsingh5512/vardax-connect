# Fortress Docker Compose
# Local development environment with all dependencies

version: "3.9"

services:
  # Fortress Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://fortress:fortress_dev@postgres:5432/fortress
      - ENFORCE_TLS=false  # Disabled for local dev
      - JA4_ENABLED=true
      - JA4_STRICT=false
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_CAPACITY=100
      - TARPIT_ENABLED=true
      - TARPIT_MAX_DELAY_MS=5000
      - MTLS_ENABLED=false  # Enable with proper certs
      - HONEYTOKEN_ENABLED=true
      - GRAPHQL_MAX_COST=1000
      - GRAPHQL_MAX_DEPTH=10
      - SOC_AUTO_REMEDIATE=false
      - ENABLE_DOCS=true
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro  # Mount for development
      - ./secrets:/secrets:ro
    networks:
      - fortress-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - fortress-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # PostgreSQL for persistence
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=fortress
      - POSTGRES_PASSWORD=fortress_dev
      - POSTGRES_DB=fortress
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fortress-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortress -d fortress"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Traefik reverse proxy (optional, for mTLS testing)
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
    networks:
      - fortress-net
    profiles:
      - with-proxy  # Only start with: docker-compose --profile with-proxy up

volumes:
  redis-data:
  postgres-data:

networks:
  fortress-net:
    driver: bridge
