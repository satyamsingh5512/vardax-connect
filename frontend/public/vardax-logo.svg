<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield outline -->
  <path d="M60 10 L100 25 L100 60 Q100 85 60 110 Q20 85 20 60 L20 25 Z" 
        stroke="url(#blueGradient)" 
        stroke-width="3" 
        fill="url(#shieldFill)"/>
  
  <!-- Inner shield glow -->
  <path d="M60 15 L95 28 L95 60 Q95 82 60 105 Q25 82 25 60 L25 28 Z" 
        fill="url(#innerGlow)" 
        opacity="0.3"/>
  
  <!-- X symbol -->
  <g transform="translate(60, 60)">
    <!-- Left diagonal of X -->
    <rect x="-25" y="-5" width="50" height="10" 
          transform="rotate(-45)" 
          fill="url(#xGradient)"/>
    <!-- Right diagonal of X -->
    <rect x="-25" y="-5" width="50" height="10" 
          transform="rotate(45)" 
          fill="url(#xGradient)"/>
  </g>
  
  <!-- Top crown/spike -->
  <path d="M60 10 L55 5 L60 0 L65 5 Z" 
        fill="url(#crownGradient)"/>
  
  <!-- Radial lines effect -->
  <g opacity="0.2">
    <line x1="60" y1="60" x2="40" y2="40" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="80" y2="40" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="40" y2="80" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="80" y2="80" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="30" y2="60" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="90" y2="60" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="60" y2="30" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="60" y2="90" stroke="#60a5fa" stroke-width="0.5"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="shieldFill" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1e47;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="innerGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="xGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="crownGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
