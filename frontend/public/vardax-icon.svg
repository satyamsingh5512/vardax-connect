<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield -->
  <path d="M32 8 L48 16 L48 32 Q48 44 32 52 Q16 44 16 32 L16 16 Z" 
        fill="url(#iconGradient)" 
        opacity="0.9"
        filter="url(#iconGlow)"/>
  
  <!-- Neural Network -->
  <circle cx="32" cy="22" r="2" fill="white" opacity="0.9"/>
  <circle cx="26" cy="28" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="32" cy="28" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="38" cy="28" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="28" cy="34" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="32" cy="34" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="36" cy="34" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="32" cy="40" r="2" fill="white" opacity="0.9"/>
  
  <!-- Checkmark -->
  <path d="M26 36 L30 40 L38 28" 
        stroke="white" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"
        opacity="0.9"/>
</svg>
