<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(20, 20)">
    <path d="M20 4 L32 10 L32 22 Q32 30 20 36 Q8 30 8 22 L8 10 Z" 
          fill="url(#textGradient)" 
          opacity="0.9"/>
    <path d="M14 22 L18 26 L26 16" 
          stroke="white" 
          stroke-width="2" 
          stroke-linecap="round" 
          fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="70" y="50" font-family="'Inter', sans-serif" font-size="36" font-weight="800" 
        fill="url(#textGradient)" letter-spacing="2" filter="url(#textGlow)">
    VARDAX
  </text>
  
  <text x="70" y="65" font-family="'Inter', sans-serif" font-size="12" font-weight="500" 
        fill="#94a3b8" letter-spacing="2">
    ML-POWERED WEB APPLICATION FIREWALL
  </text>
</svg>
